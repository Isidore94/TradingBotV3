name: Weekly Discord Avail Check

on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  post-avail-check:
    runs-on: ubuntu-latest
    steps:
      - name: Post weekly avail check to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os, time
          from datetime import datetime, timedelta

          WEBHOOK_URL = os.environ["WEBHOOK_URL"]

          def post(content):
              data = json.dumps({"content": content}).encode("utf-8")
              req = urllib.request.Request(
                  WEBHOOK_URL, data=data,
                  headers={"Content-Type": "application/json"}, method="POST"
              )
              try:
                  with urllib.request.urlopen(req):
                      print(f"  ok: {content[:60]}")
              except urllib.error.HTTPError as e:
                  print(f"  err {e.code}: {e.reason}")
              time.sleep(0.6)

          today       = datetime.utcnow()
          next_monday = today + timedelta(days=1)
          next_sunday = next_monday + timedelta(days=6)

          if next_monday.month == next_sunday.month:
              label = f"{next_monday.strftime('%B %-d')}-{next_sunday.strftime('%-d')}"
          else:
              label = f"{next_monday.strftime('%B %-d')} - {next_sunday.strftime('%B %-d')}"

          post(f"# Weekly avail check for {label}")
          for day in ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"]:
              post(f"## {day}")
              for t in ["9","10"]:
                  post(f"{t} 👍")
          print("Done!")
          PYEOF
